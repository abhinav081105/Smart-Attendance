<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn | Smart Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --background: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .auth-header { text-align: center; margin-bottom: 40px; }
        .auth-header h1 { font-size: 2rem; font-weight: 800; margin: 0; color: var(--text-main); letter-spacing: -0.05em; }
        .auth-header p { color: var(--text-muted); font-weight: 500; margin-top: 8px; }

        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 32px;
        }

        .tab-btn {
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-muted);
        }

        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 700; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .submit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .msg {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            display: none;
        }
        .msg.error { background: #fee2e2; color: #991b1b; display: block; }
        .msg.success { background: #dcfce7; color: #15803d; display: block; }

        @media (max-width: 480px) {
            .auth-container { padding: 32px 24px; border-radius: 24px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div style="margin-bottom: 25px; text-align: center;">
                <img src="college-logo.png" style="height: 80px; width: auto; object-fit: contain;">
            </div>
            <h1>Attendance Hub</h1>
            <p>Smart verification system</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" id="loginTab">Sign In</button>
            <button class="tab-btn" id="registerTab">Sign Up</button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Access Role</label>
                <select id="loginType">
                    <option value="student">Student</option>
                    <option value="cr">Class CR</option>
                    <option value="faculty">Faculty Member</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <div class="form-group">
                <label id="loginIdLabel">ID Number / Roll No</label>
                <input type="text" id="loginId" placeholder="Enter your credentials" required>
            </div>
            <div class="form-group">
                <label>Secure Key</label>
                <input type="password" id="loginPass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Continue to Dashboard</button>
            <div id="loginMsg" class="msg"></div>
        </form>

        <form id="registerForm" style="display:none;">
            <div class="form-group">
                <label>Account Type</label>
                <select id="regType">
                    <option value="faculty">Faculty Member</option>
                </select>
                <p id="regNotice" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">Only faculty members can self-register. Students/CRs are added by Administration.</p>
            </div>
            <div class="form-group">
                <label id="regIdLabel">ID Number</label>
                <input type="text" id="regId" placeholder="Ex: FAC101" required>
            </div>
            <div class="form-group">
                <label>Setup Password</label>
                <input type="password" id="regPass" placeholder="Choose a strong password" required>
            </div>
            <div class="form-group">
                <label>Verify Password</label>
                <input type="password" id="regPass2" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="submit-btn" style="background: var(--secondary); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);">Initialize Account</button>
            <div id="registerMsg" class="msg"></div>
        </form>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api/auth';
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginType = document.getElementById('loginType');
        const regType = document.getElementById('regType');

        loginTab.onclick = () => {
            loginTab.classList.add('active'); registerTab.classList.remove('active');
            loginForm.style.display = 'block'; registerForm.style.display = 'none';
        };
        registerTab.onclick = () => {
            registerTab.classList.add('active'); loginTab.classList.remove('active');
            loginForm.style.display = 'none'; registerForm.style.display = 'block';
        };

        function updateLabels(select, labelId) {
            const label = document.getElementById(labelId);
            const val = select.value;
            if (val === 'faculty') label.innerText = "Faculty Employee ID";
            else if (val === 'admin') label.innerText = "Admin Secret Key";
            else label.innerText = "University Roll Number";
        }

        loginType.onchange = () => updateLabels(loginType, 'loginIdLabel');
        regType.onchange = () => updateLabels(regType, 'regIdLabel');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const type = loginType.value;
            const idVal = document.getElementById('loginId').value.trim().toUpperCase();
            const pass = document.getElementById('loginPass').value;
            const msgEl = document.getElementById('loginMsg'); msgEl.className = 'msg';

            const payload = { type, pass };
            if (['cr', 'student'].includes(type)) payload.reg = idVal;
            else if (type === 'faculty') payload.facultyId = idVal;
            else payload.adminId = idVal;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    msgEl.innerText = "Authorized. Portal opening..."; msgEl.classList.add('success');
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    setTimeout(() => {
                        if (data.user.type === 'admin') window.location.href = 'admin.html';
                        else if (data.user.type === 'student') window.location.href = 'student-dashboard.html';
                        else window.location.href = 'index.html';
                    }, 1000);
                } else {
                    msgEl.innerText = data.message || "Invalid access credentials"; msgEl.classList.add('error');
                }
            } catch (err) { alert("Core server unreachable."); }
        };

        registerForm.onsubmit = async (e) => {
            e.preventDefault();
            const pass = document.getElementById('regPass').value;
            if (pass !== document.getElementById('regPass2').value) return alert("Passwords mismatch!");

            const payload = {
                type: regType.value,
                pass,
                facultyId: document.getElementById('regId').value.trim().toUpperCase()
            };

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                const msgEl = document.getElementById('registerMsg');
                if (res.ok) {
                    msgEl.innerText = "Registration verified! Please Sign In."; msgEl.className = "msg success";
                    setTimeout(() => loginTab.click(), 2000);
                } else {
                    msgEl.innerText = data.message || "Registration failed"; msgEl.className = "msg error";
                }
            } catch (err) { alert("Server error."); }
        };

        async function checkReg() {
            try {
                const res = await fetch(`${API_BASE}/registration-status`);
                const data = await res.json();
                if (!data.registrationEnabled) {
                    document.getElementById('registerTab').style.display = 'none';
                    document.getElementById('registerForm').innerHTML = `<div style="text-align:center; padding: 20px;"><h3 style="color:var(--primary);">Restricted</h3><p>Self-registration is temporarily locked by admin.</p></div>`;
                }
            } catch(e) {}
        }
        checkReg();
    </script>
</body>
</html>
