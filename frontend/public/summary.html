<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance Summary - Professional Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #10b981;
      --accent: #f59e0b;
      --danger: #ef4444;
      --background: #fdfdfd;
      --card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #f1f5f9;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
      --glass-bg: rgba(255, 255, 255, 0.8);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      margin: 0;
      min-height: 100vh;
      color: var(--text-main);
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 28px;
      padding: 48px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    h2 {
      font-size: 2.25rem;
      font-weight: 800;
      margin-top: 0;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, var(--primary), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .date-label {
      font-weight: 600;
      color: var(--text-muted);
      margin-top: -10px;
      display: block;
      font-size: 1.1rem;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--glass-bg);
      padding: 24px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }

    .stat-val {
      display: block;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table-card {
      background: var(--glass-bg);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 40px;
    }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 18px 24px; background: #fafafa; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; border-bottom: 1px solid var(--border); }
    td { padding: 18px 24px; border-bottom: 1px solid var(--border); font-weight: 600; }
    
    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-present { background: #dcfce7; color: #15803d; }
    .badge-absent { background: #fee2e2; color: #991b1b; }
    .badge-permission { background: #fffbeb; color: #b45309; }
    .badge-detained { background: #f1f5f9; color: #475569; }

    .actions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 600px) {
      .actions-grid { grid-template-columns: 1fr; }
      .container { padding: 24px; }
      h2 { font-size: 1.75reml; }
    }

    .btn {
      padding: 16px 20px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .btn-post { background: var(--primary); color: white; border-bottom: 4px solid var(--primary-dark); }
    .btn-post:hover { background: var(--primary-dark); transform: scale(1.02); }
    .btn-post:active { transform: translateY(2px); border-bottom-width: 0; }

    .btn-whatsapp { background: #128c7e; color: white; }
    .btn-pdf { background: #475569; color: white; }
    .btn-edit { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .btn-logout { background: transparent; color: var(--danger); border: 2px solid #fee2e2; grid-column: 1 / -1; margin-top: 10px; }

    .btn:hover { opacity: 0.9; }

    .message {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      z-index: 1000;
      display: none;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div id="statusMsg" class="message"></div>

  <div class="container">
    <header>
      <div style="margin-bottom: 20px; text-align: center;">
        <img src="college-logo.png" style="height: 70px; width: auto; object-fit: contain;">
      </div>
      <h2 id="summaryHeading">Class Attendance Summary</h2>
      <span id="dateLabel" class="date-label">Date Loading...</span>
    </header>
    
    <div class="stats-container">
      <div class="stat-card" style="border-top: 4px solid var(--primary);">
        <span id="presentCount" class="stat-val" style="color: var(--secondary);">0</span>
        <span class="stat-label">Presents</span>
      </div>
      <div class="stat-card" style="border-top: 4px solid var(--danger);">
        <span id="absentCount" class="stat-val" style="color: var(--danger);">0</span>
        <span class="stat-label">Absents</span>
      </div>
      <div class="stat-card" style="border-top: 4px solid var(--accent);">
        <span id="permissionCount" class="stat-val" style="color: var(--accent);">0</span>
        <span class="stat-label">Permission</span>
      </div>
    </div>

    <div class="table-card">
      <table id="resultTable">
        <thead><tr><th>Student Roll Number</th><th>Attendance Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    
    <div class="actions-grid">
      <button id="postToAdminBtn" class="btn btn-post">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        Post Summary to Admin
      </button>

      <button id="sendWhatsappBtn" class="btn btn-whatsapp">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01C17.18 3.03 14.69 2 12.04 2z"/></svg>
        Notify Absentees
      </button>

      <button id="downloadBtn" class="btn btn-pdf">Download PDF</button>
      <button id="backToAttendanceBtn" class="btn btn-edit">Edit Records</button>
      <button id="logoutBtn" class="btn btn-logout">Sign Out</button>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!user) window.location.href = "auth.html";

    const attendanceData = JSON.parse(localStorage.getItem('attendanceData') || '[]');
    let presentVal = 0, absentVal = 0, permissionVal = 0, detainedVal = 0;
    
    attendanceData.forEach(r => {
      if (r.status === 'present') presentVal++;
      else if (r.status === 'absent') absentVal++;
      else if (r.status === 'permission') permissionVal++;
      else if (r.status === 'detained') detainedVal++;
    });

    document.getElementById('presentCount').textContent = presentVal;
    document.getElementById('absentCount').textContent = absentVal;
    document.getElementById('permissionCount').textContent = permissionVal;

    const summary = JSON.parse(localStorage.getItem('attendanceSummary') || '{}');
    const sectionName = summary.section || 'Unknown';
    const reqDate = localStorage.getItem('attendanceDate') || new Date().toISOString().split('T')[0];
    document.getElementById('dateLabel').textContent = `${sectionName} • ${reqDate}`;

    const tbody = document.querySelector('#resultTable tbody');
    attendanceData.forEach(r => {
      const tr = document.createElement('tr');
      const badgeCls = `badge-${r.status}`;
      tr.innerHTML = `
        <td style="font-family: monospace; font-size: 1.1rem;">${r.registerNumber}</td>
        <td><span class="status-badge ${badgeCls}">${r.status}</span></td>
      `;
      tbody.appendChild(tr);
    });

    function showMsg(msg, isError = false) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.style.background = isError ? 'var(--danger)' : 'var(--secondary)';
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    document.getElementById('postToAdminBtn').onclick = async () => {
      const preferredSectionId = localStorage.getItem('preferredSectionId') || (user.type === 'cr' ? user.section : null);
      if (!preferredSectionId) return showMsg('Section error', true);

      try {
        const res = await fetch('http://localhost:5000/api/attendance/finalize', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: reqDate, sectionId: preferredSectionId })
        });
        if (res.ok) {
          showMsg('Sucessfully posted to Administrator!');
          document.getElementById('postToAdminBtn').disabled = true;
          document.getElementById('postToAdminBtn').textContent = '✅ Summary Posted';
          document.getElementById('postToAdminBtn').style.opacity = '0.5';
        } else {
          showMsg('Post failed', true);
        }
      } catch (err) { alert('Network error'); }
    }

    document.getElementById('downloadBtn').onclick = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(22);
      doc.text("Attendance Report", 15, 20);
      doc.setFontSize(12);
      doc.text(`Section: ${sectionName}`, 15, 30);
      doc.text(`Date: ${reqDate}`, 15, 37);
      
      const stats = `Present: ${presentVal} | Absent: ${absentVal} | Permission: ${permissionVal}`;
      doc.text(stats, 15, 47);

      doc.autoTable({
        head: [['Roll Number', 'Status']],
        body: attendanceData.map(r => [r.registerNumber, r.status.toUpperCase()]),
        startY: 55,
        theme: 'striped',
        headStyles: { fillColor: [99, 102, 241] }
      });
      doc.save(`Summary_${sectionName}_${reqDate}.pdf`);
    };

    document.getElementById('sendWhatsappBtn').onclick = () => {
      const absentees = attendanceData.filter(r => r.status === 'absent').map(r => r.registerNumber).join(', ');
      const msg = encodeURIComponent(`🚨 *Absentees Report*\n📍 Section: ${sectionName}\n📅 Date: ${reqDate}\n\n❌ Absentees:\n${absentees || 'None Registered'}\n\n_Generated via Attendance Portal_`);
      window.open(`https://api.whatsapp.com/send?text=${msg}`);
    };

    document.getElementById('backToAttendanceBtn').onclick = () => window.location.href = "index.html";
    document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = "auth.html"; };
  </script>
</body>
</html>
